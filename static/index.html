<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resona</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="brand">
      <img src="/static/logo.svg" alt="Resona" />
    </div>
    <p class="tagline">Point your mic at any song in the library and let it listen</p>

    <div class="stage" id="stage">
      <canvas id="waveformCanvas"></canvas>
      <div class="sonar-ring"></div>
      <div class="sonar-ring"></div>
      <div class="sonar-ring"></div>
      <button class="mic-button" id="micButton" aria-label="Start listening">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      </button>
    </div>

    <p class="status-text" id="statusText">Tap the button and play music nearby</p>

    <div class="progress-track" id="progressTrack">
      <div class="progress-fill"></div>
    </div>

    <div class="dropzone" id="dropzone">
      or <span class="dz-highlight">drag and drop</span> / click to upload an audio file
      <input type="file" id="fileInput" accept="audio/*" />
    </div>

    <div class="file-preview" id="filePreview">
      <span class="file-name" id="filePreviewName"></span>
      <audio id="filePreviewAudio" controls></audio>
      <button class="mic-button" id="analyzeUploadBtn" style="width:44px;height:44px;">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>

    <div class="result-card" id="resultCard"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
